name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-study-app/package-lock.json

      - name: Install deps
        run: cd my-study-app && npm ci

      - name: Build
        run: cd my-study-app && npm run build

      - name: Copy support/privacy pages
        run: |
          mkdir -p my-study-app/out/support my-study-app/out/privacy
          cp docs/support/index.html my-study-app/out/support/index.html
          cp docs/privacy/index.html my-study-app/out/privacy/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: my-study-app/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Release Verification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    name: Web build and browser smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-study-app
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-study-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke:static

  android:
    name: Android unit tests and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-study-app
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-study-app/package-lock.json
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Install Android API 36 SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: npm ci
      - run: npm run build
      - run: npx cap sync android
      - run: npm run verify:android
